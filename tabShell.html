    let initialUrl = ''
    let partitionName = ''

      partitionName = config.partition

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; background: #2d2d2d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    #tab-bar { display: flex; align-items: center; background: #1e1e1e; color: white; padding: 4px 4px 0 4px; overflow-x: auto; white-space: nowrap; }
    .tab { display: inline-flex; align-items: center; background: #3c3c3c; color: #ccc; border-radius: 4px 4px 0 0; padding: 6px 12px; margin-right: 2px; cursor: default; user-select: none; font-size: 12px; max-width: 200px; }
    .tab.active { background: #2d2d2d; color: white; }
    .tab button { background: none; border: none; color: inherit; margin-left: 8px; cursor: pointer; font-size: 14px; opacity: 0.6; }
    .tab button:hover { opacity: 1; }
    #new-tab { background: #3c3c3c; color: white; border: none; border-radius: 4px; width: 24px; height: 24px; font-size: 16px; line-height: 1; cursor: pointer; margin-left: 4px; }
    #webview-container { flex: 1; background: white; }
    webview { display: inline-flex; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="tab-bar">
    <div class="tab active" data-id="0">DAT</div>
    <button id="new-tab">+</button>
  </div>
  <div id="webview-container">
    <webview id="webview-0" partition="persist:default" src="about:blank" allowpopups></webview>
  </div>

  <script>
    const { ipcRenderer } = require('electron')
    let tabs = []
    let activeTabId = 0
    let nextId = 1

    ipcRenderer.on('tab-shell-init', (event, { url, partition }) => {
      // Create the first tab with the given partition
      tabs.push({ id: 0, webview: document.getElementById('webview-0'), url, partition })
      document.querySelector('.tab[data-id="0"]').textContent = new URL(url).hostname
      tabs[0].webview.src = url
      tabs[0].webview.partition = partition
    })

    function createTab(url = 'https://one.dat.com') {
      const id = nextId++
      const webview = document.createElement('webview')
      webview.id = `webview-${id}`
      webview.setAttribute('allowpopups', '')
      webview.style.display = 'none'
      document.getElementById('webview-container').appendChild(webview)

      const tab = document.createElement('div')
      tab.className = 'tab'
      tab.dataset.id = id
      tab.innerHTML = `New Tab <button onclick="closeTab(${id})">×</button>`
      document.getElementById('tab-bar').insertBefore(tab, document.getElementById('new-tab'))

      tabs.push({ id, webview, url, partition: activeTab ? activeTab.partition : 'persist:default' })
      webview.partition = activeTab ? activeTab.partition : 'persist:default'
      webview.src = url

      // Switch to new tab
      setActiveTab(id)
    }

    window.createTab = createTab

    function setActiveTab(id) {
      tabs.forEach(t => {
        const active = t.id === id
        t.webview.style.display = active ? 'inline-flex' : 'none'
        document.querySelector(`.tab[data-id="${t.id}"]`).classList.toggle('active', active)
      })
      activeTabId = id
    }

    function closeTab(id) {
      const index = tabs.findIndex(t => t.id === id)
      if (index === -1) return
      const tab = tabs[index]
      tab.webview.remove()
      document.querySelector(`.tab[data-id="${id}"]`).remove()
      tabs.splice(index, 1)
      if (tabs.length === 0) {
        ipcRenderer.send('close-tab-shell')
      } else {
        setActiveTab(tabs[Math.min(index, tabs.length - 1)].id)
      }
    }

    document.getElementById('new-tab').addEventListener('click', () => createTab())
  </script>
</body>
</html>
